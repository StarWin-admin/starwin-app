<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StarWin App</title>
    <!-- Подключаем официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0b16;
            --purple-glow: #bc13fe;
            --cyan-glow: #0bf;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* Задний неоновый фон */
        .glow-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -50px;
            z-index: -1;
        }

        /* Контейнер приложения */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        /* Шапка с балансом */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--purple-glow), var(--cyan-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 187, 255, 0.3);
        }

        .balance {
            font-size: 16px;
            font-weight: 600;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
        }

        /* Кейс и Зона открытия */
        .case-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
            width: 100%;
        }

        .case-box {
            position: relative;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(11, 170, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Символическая светящаяся звезда-кейс */
        .case-logo {
            font-size: 80px;
            filter: drop-shadow(0 0 20px var(--purple-glow));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px var(--purple-glow)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 35px var(--cyan-glow)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--purple-glow)); }
        }

        /* Кнопка "Открыть" */
        .btn-open {
            background: transparent;
            border: 2px solid var(--cyan-glow);
            color: #fff;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 187, 255, 0.2), inset 0 0 15px rgba(0, 187, 255, 0.1);
            width: 80%;
            max-width: 280px;
        }

        .btn-open:active {
            transform: scale(0.95);
            border-color: var(--purple-glow);
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.5), inset 0 0 10px rgba(188, 19, 254, 0.3);
        }

        /* Прогресс-бар */
        .progress-container {
            width: 80%;
            max-width: 280px;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--purple-glow), var(--cyan-glow));
            box-shadow: 0 0 10px var(--cyan-glow);
            transition: width 0.1s linear;
        }

        /* Всплывающий результат дропа */
        .drop-result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 24px;
            text-align: center;
            background: linear-gradient(90deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Нижнее меню навигации */
        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: rgba(11, 11, 22, 0.8);
            border-top: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            bottom: 0;
            backdrop-filter: blur(20px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8a8a9e;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--cyan-glow);
            text-shadow: 0 0 10px rgba(0, 187, 255, 0.4);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="container">
        <!-- Шапка приложения -->
        <div class="header">
            <div class="logo">StarWin</div>
            <div class="balance" id="balance-view">
                <span>⭐️</span> <span id="stars-count">120</span> XTR
            </div>
        </div>

        <!-- Игровая зона открытия кейсов -->
        <div class="case-area">
            <div class="case-box">
                <div class="case-logo" id="case-art">📦</div>
            </div>
            
            <button class="btn-open" id="btn-spin" onclick="startRoll()">Открыть кейс</button>
            
            <!-- Прогресс-бар во время ролла -->
            <div class="progress-container" id="progress-parent">
                <div class="progress-bar" id="progress-line"></div>
            </div>

            <!-- Сюда выводится приз -->
            <div class="drop-result" id="drop-text"></div>
        </div>
    </div>

    <!-- Навигационная панель -->
    <div class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">🎰</span>
            <span>Кейсы</span>
        </div>
        <div class="nav-item" onclick="showInfo('Инвентарь в разработке!')">
            <span class="nav-icon">🎒</span>
            <span>Рюкзак</span>
        </div>
        <div class="nav-item" onclick="showInfo('Профиль подгружается из Telegram!')">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем приложение на весь экран телефона

        let balance = 120;
        const gifts = [
            { name: "🧸 Обычный Мишка", icon: "🧸" },
            { name: "🎈 Воздушный Шарик", icon: "🎈" },
            { name: "🍫 Шоколадка", icon: "🍫" },
            { name: "🖼 NFT: Золотой Дуров", icon: "🖼" },
            { name: "💎 NFT: Крипто-Лев", icon: "💎" },
            { name: "⚡ NFT: Кибер-Хакер", icon: "⚡" }
        ];

        function startRoll() {
            if (balance < 20) {
                tg.showAlert("Недостаточно звезд!");
                return;
            }

            // Списываем баланс (визуально на фронтенде)
            balance -= 20;
            document.getElementById('stars-count').innerText = balance;

            const btn = document.getElementById('btn-spin');
            const progressParent = document.getElementById('progress-parent');
            const progressLine = document.getElementById('progress-line');
            const dropText = document.getElementById('drop-text');
            const caseArt = document.getElementById('case-art');

            btn.style.display = 'none';
            progressParent.style.display = 'block';
            dropText.innerText = 'Роллим кейс...';
            caseArt.innerText = '🎰';

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    
                    // Выбираем приз
                    const prize = gifts[Math.floor(Math.random() * gifts.length)];
                    
                    // Показываем результат
                    caseArt.innerText = prize.icon;
                    dropText.innerText = `Выпало: ${prize.name}!`;
                    
                    // Возвращаем кнопку
                    btn.style.display = 'block';
                    progressParent.style.display = 'none';
                    progressLine.style.style = '0%';

                    // Вызываем легкую вибрацию на телефоне (если поддерживается)
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                } else {
                    width += 5;
                    progressLine.style.width = width + '%';
                }
            }, 80);
        }

        function showInfo(msg) {
            tg.showPopup({
                title: 'Информация',
                message: msg,
                buttons: [{type: 'ok'}]
            });
        }
    </script>
</body>
</html>
